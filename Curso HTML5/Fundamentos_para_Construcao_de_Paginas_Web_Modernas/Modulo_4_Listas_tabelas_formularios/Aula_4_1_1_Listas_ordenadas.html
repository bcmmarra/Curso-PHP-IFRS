<!-- 
4.1.1 Listas ordenadas
Para criar uma lista ordenada em HTML, você pode usar a tag <ol> (ordered list) e aninhar cada item da lista dentro da tag <li> (list item) (W3C Schools, 2024). 

O quadro abaixo apresenta um exemplo simples de lista ordenada: 
-->
<ol>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>

</ol>

<!-- 
Neste exemplo, criamos uma lista ordenada com três itens numerados de forma sequencial. Você pode adicionar quantos itens quiser seguindo o mesmo padrão. O navegador renderizará a lista com os números automaticamente, conforme figura abaixo.

Link da imagem: https://lh7-us.googleusercontent.com/bDRIQAcRnc_8_8_3omaK2zht2aEcC0G-A3Mqlm7QRp2oyn5a2Rv8YqkYVzugRpn9KC8lXjbBOKvGsSGyEOEETI70JQ959-ib-quLfoNXLQsBwF_eEaW2VtXdXUtAFYFxXTwqnVZdEqVcVMAX-uMdBQ

A tag <ol> pode aceitar vários atributos para personalizar sua aparência e comportamento. Veremos abaixo mais informações sobre estes atributos.

Atributo start
O atributo start da tag <ol> (ordered list) é usado para especificar o valor inicial da contagem numérica de uma lista ordenada. Isso pode ser útil quando você deseja iniciar a contagem em um número diferente de 1.

No quadro abaixo está um exemplo de como usar o atributo start:
-->

<ol start="5">
    <li>Item 5</li>
    <li>Item 6</li>
    <li>Item 7</li>
</ol>

<!-- 
Neste exemplo, a lista ordenada inicia a contagem a partir do número 5, como especificado pelo atributo start. Assim, o primeiro item da lista será "Item 5", o segundo será "Item 6" e assim por diante. O navegador renderizará a lista de acordo com os valores fornecidos, conforme figura abaixo.

Link da imagem: https://lh7-us.googleusercontent.com/zO68iQLq8AKEsiHkHD2R3LwjG96BVUCsPMsOOef5s82T-26yIR_k_UZbe8aM9Nyniv2gNDkf3fQwSCAidsMGh39W8Z-tHmihHJpAAIxNdbXz7x4ZiCtj3mozPnXg4WUjKvCFbX-ShjZpwOJk9M3qlg

Atributo type
O atributo type da tag <ol> é usado para especificar o tipo de marcador usado para os itens da lista ordenada (Alves, 2021; W3C Schools, 2024). 

Os valores possíveis para esse atributo são:

type="1": Usa números (1, 2, 3, ...) como marcadores. Este é o valor padrão se nenhum for especificado.
type="A": Usa letras maiúsculas (A, B, C, ...).
type="a": Usa letras minúsculas (a, b, c, ...).
type="I": Usa algarismos romanos maiúsculos (I, II, III, ...).
type="i": Usa algarismos romanos minúsculos (i, ii, iii, ...).
No quadro abaixo está um exemplo de como usar o atributo type:
-->
<ol type="A">
    <li>Item A</li>
    <li>Item B</li>
    <li>Item C</li>
</ol>

<!-- 
Atributo reversed
O atributo reversed da tag <ol> é usado para indicar que a lista ordenada deve ser exibida em ordem decrescente, em vez da ordem padrão crescente. Esse atributo não requer um valor, basta incluí-lo para indicar que a lista deve ser revertida.

No quadro abaixo está um exemplo de como usar o atributo reversed:
-->
<ol reversed>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ol>

<!-- 
Neste exemplo, a lista ordenada será exibida em ordem decrescente, começando pelo último item especificado até o primeiro. O marcador será decrementado em vez de incrementado conforme os itens são listados.
-->
