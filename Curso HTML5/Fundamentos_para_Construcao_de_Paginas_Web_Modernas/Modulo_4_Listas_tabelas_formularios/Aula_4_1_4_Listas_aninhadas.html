<!-- 
4.1.4 Listas aninhadas
Em HTML, é possível criar listas aninhadas inserindo uma lista dentro de outra. Isso permite organizar os itens em hierarquias ou níveis, facilitando a estruturação de informações complexas.

O quadro abaixo apresenta um exemplo simples de como criar listas aninhadas: 
-->
<ul>
    <li>Item 1</li>
    <li>Item 2
        <ul>
            <li>Item 2.1</li>
            <li>Item 2.2</li>
            <li>Item 2.3</li>
        </ul>
    </li>
    <li>Item 3</li>
</ul>

<!--
