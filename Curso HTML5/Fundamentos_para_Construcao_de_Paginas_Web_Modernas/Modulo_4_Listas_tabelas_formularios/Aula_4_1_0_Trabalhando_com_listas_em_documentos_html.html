4.1 Trabalhando com listas em documentos HTML
As listas em HTML são estruturas que permitem agrupar e organizar conteúdo de forma ordenada ou não ordenada. Elas são amplamente usadas para criar menus de navegação, listas de itens, definições, entre outros (MDN Web Docs, 2024). Existem três tipos principais de listas em HTML:

> listas não ordenadas; 
> listas ordenadas;
> listas de definições.

As listas ordenadas utilizam sequências ordinais para indicar a ordem dos elementos da lista.
As listas não ordenadas usam um símbolo definido, como um marcador, para listar elementos sem ordem designada.
As listas de descrição usam recuos para listar elementos pais com seus filhos.

Veremos mais sobre como podemos trabalhar com listas em HTML no decorrer deste curso.
