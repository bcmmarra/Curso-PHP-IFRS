<!-- 
2.3.5 Quebra de linha
A tag <br> é usada para inserir uma quebra de linha, ou seja, ela cria uma nova linha no local onde é colocada. Ela é útil quando você quer separar visualmente duas linhas de texto em um lugar onde a quebra de linha normal não é realizada automaticamente pelo navegador. Veja no quadro abaixo um exemplo:
-->

<p>Este é o primeiro parágrafo.<br>Este é o segundo parágrafo.</p>

OBS: É importante notar que a tag <br> não possui uma tag de fechamento, já que ela não envolve nenhum conteúdo. Ela é uma tag vazia e não precisa de uma barra de fechamento, tal como <br />, mas que também é válido em HTML.
