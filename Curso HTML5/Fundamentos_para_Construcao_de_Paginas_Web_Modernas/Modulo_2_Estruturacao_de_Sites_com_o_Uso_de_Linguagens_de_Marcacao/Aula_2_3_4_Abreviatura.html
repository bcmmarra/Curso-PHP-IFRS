<!-- 
2.3.4 Abreviaturas
Em HTML, você pode usar a tag <abbr> para definir uma abreviatura e opcionalmente fornecer uma expansão para ela. Isso é útil para fornecer informações adicionais sobre a abreviatura, o que pode ser útil para acessibilidade e para esclarecer o significado para os leitores. 

O quadro abaixo apresenta um exemplo de como você pode usar essa tag:
-->

<p>HTML é uma linguagem de marcação usada para criar páginas web. A sigla HTML significa <abbr title="Hypertext Markup Language">HTML</abbr>.</p>
