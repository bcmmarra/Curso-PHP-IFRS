1.4 Sintaxe Básica: Variáveis, Tipos de Dados, Operadores e Estruturas de Controle

Antes de mergulhar em projetos mais complexos com JavaScript, é essencial compreender sua sintaxe básica — o conjunto de regras que define como o código deve ser escrito e interpretado. Essa base permitirá que você desenvolva programas mais organizados, claros e funcionais.

Neste capítulo, vamos abordar quatro pilares fundamentais da linguagem:

Variáveis: são “caixinhas” na memória do computador onde podemos armazenar e manipular informações, como números, textos ou valores lógicos.

Tipos de Dados: definem o tipo de informação que uma variável pode conter (por exemplo, números, strings ou valores booleanos).

Operadores: permitem realizar cálculos, comparações e outras operações sobre os dados.

Estruturas de Controle: instruções que orientam o fluxo de execução do programa, como decisões condicionais e repetições de tarefas.

Compreender esses conceitos é como aprender o alfabeto de uma nova língua: eles serão a base para todas as construções que você fará em JavaScript. Ao final deste capítulo, você estará apto(a) a criar pequenos programas, testar hipóteses no console e entender como o navegador interpreta suas instruções passo a passo.
