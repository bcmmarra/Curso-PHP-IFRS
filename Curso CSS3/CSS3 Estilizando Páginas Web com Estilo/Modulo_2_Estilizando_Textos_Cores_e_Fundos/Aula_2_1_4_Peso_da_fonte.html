<!-- 
2.1.4 Peso da fonte
A propriedade font-weight é usada para definir a espessura, ou o peso, do texto de um elemento. Isso afeta o quão grosso ou fino os caracteres aparecem em uma tela ou impressão. Logo, propriedade font-weight pode ser especificada usando valores que vão de 100 a 900, em incrementos de 100.
A propriedade font-weight pode aceitar vários tipos de valores:

Palavras-chave Normais: 
normal: O peso normal do texto, geralmente equivalente a 400.
bold: Texto em negrito, geralmente equivalente a 700.

Valores Numéricos:
100, 200, 300: Pesos de fonte mais finos.
500, 600: Pesos de fonte um pouco mais grossos que o normal.
800, 900: Pesos de fonte muito grossos, mais do que bold.

Valores Relativos:
bolder e lighter: Estes valores ajustam o peso da fonte para ser mais pesado ou mais leve, respectivamente, em relação ao peso herdado do elemento pai.

Vejamos no quadro abaixo um exemplo: 
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Exemplo de Font-Weight</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            font-weight: bold;
            /* Negrito */
        }

        p.light {
            font-weight: 300;
            /* Peso de fonte leve */
        }

        p.normal {
            font-weight: normal;
            /* Peso de fonte normal */
        }

        p.bold {
            font-weight: 800;
            /* Peso de fonte muito grosso */
        }

        strong {
            font-weight: bolder;
            /* Mais grosso que o elemento pai */
        }
    </style>
</head>

<body>
    <h1>Cabeçalho com Texto em Negrito</h1>
    <p class="light">Este parágrafo é renderizado com um peso de fonte leve.</p>
    <p class="normal">Este parágrafo tem o peso de fonte normal.</p>
    <p class="bold">Este parágrafo tem um peso de fonte muito grosso, mais do que negrito padrão.</p>
    <p>Texto <strong>muito</strong> importante!</p>
</body>

</html>
