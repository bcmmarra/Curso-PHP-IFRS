3.1 Posicionamento
O posicionamento em CSS é uma ferramenta poderosa que permite aos desenvolvedores controlar como os elementos são exibidos e organizados na página. A propriedade display e a propriedade position do CSS são fundamentais para o controle do layout e a apresentação de elementos em uma página web, mas cada uma serve a propósitos diferentes (ALVES, 2021; NETO; SANTOS; AGUIAR, 2013). 

Resumidamente, a propriedade display define como um elemento é tratado no fluxo de layout. Ela determina o tipo de caixa de renderização — como block, inline, inline-block, flex, grid, entre outros. Enquanto que a propriedade position determina o método de posicionamento de um elemento no espaço da página, independente do fluxo normal dos documentos. Valores incluem static, relative, absolute, fixed, e sticky.

Entender essas diferenças é crucial para aplicar estilos de layout eficazes e resolver problemas de design específicos.

OBS: Para fins didáticos, utilizaremos CSS Internal (Embutido) em nossos exemplos. Isso permitirá que você visualize claramente como o CSS e o HTML são integrados na mesma página. Assim, você poderá copiar e colar o código fornecido diretamente em seu arquivo de testes, como o index.html. No entanto, se preferir, você também tem a opção de separar o código CSS e colocá-lo em um arquivo próprio, como o style.css.
