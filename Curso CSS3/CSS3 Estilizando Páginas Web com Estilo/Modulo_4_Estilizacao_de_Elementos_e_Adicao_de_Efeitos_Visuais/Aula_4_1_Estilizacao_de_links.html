<!-- 
4.1 Estilização de links
Estilizar links com CSS é fundamental para garantir que eles sejam visualmente atraentes e funcionais dentro do contexto de uma página web. Os links, também chamados de âncoras, costumam ser destacados para que os usuários possam facilmente identificar pontos clicáveis que os levarão a novas páginas ou seções do site (ALVES, 2021; SILVA, 2012). 

Veremos, no decorrer deste texto, algumas dicas e exemplos de como você pode estilizar links usando CSS.

4.1.1 Cores e decoração de texto

O estilo visual básico de um link inclui sua cor e a decoração de texto (geralmente sublinhado). Você pode definir estilos diferentes para os estados do link: normal, hover (quando o mouse está sobre o link), active (no momento do clique) e visited (após o link ter sido visitado). 

Neste contexto, você geralmente trabalha com as pseudo-classes do CSS, tal como no exemplo demonstrado no quadro abaixo: 
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Links</title>
    <style>
        a:link {
            color: blue;
            /* Cor dos links não visitados */
            text-decoration: none;
            /* Remove o sublinhado */
        }

        a:visited {
            color: purple;
            /* Cor dos links visitados */
        }

        a:hover {
            color: red;
            /* Cor ao passar o mouse */
            text-decoration: underline;
            /* Sublinhado ao passar o mouse */
        }
    </style>
</head>

<body>
    <a href="http://example1.com">Site já visitado</a><br>
    <a href="http://example2.com">Site não visitado</a><br>
    <a href="http://example3.com">Site com foco</a>
</body>

</html>

Fundo e Preenchimento
Adicionar um fundo (background) e preenchimento (padding) pode fazer o link se destacar mais, especialmente quando se trata de links dentro de um menu de navegação ou botões (NETO; SANTOS; AGUIAR, 2013). Vejamos um exemplo, conforme quadro abaixo, que mostra como aplicar essas propriedades para melhorar o design de links na sua página web.
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilização de Fundo e Preenchimento</title>
    <style>
        body {
            margin-top: 20px;
            /* Define margem superior para o documento*/
            padding: 0;
            /* Reseta o padding para o documento*/
        }

        /* Estilização “normal” dos links de navegação */
        a {
            padding: 10px 20px;
            /* Preenchimento vertical e horizontal */
            background-color: #0077cc;
            /* Cor de fundo azul */
            color: white;
            /* Cor do texto branco */
            text-decoration: none;
            /* Remove o sublinhado dos links */
            margin: 5px;
            /* Margem entre os links */
            border-radius: 5px;
            /* Bordas arredondadas */
        }

        /* Efeito hover para os links de navegação */
        a:hover {
            background-color: #005fa3;
            /* Cor de fundo mais escura ao passar o mouse */
            color: #f3d00b;
            /* Muda a cor do texto ao passar o mouse */
        }

        /* Efeito focus para os links de navegação */
        a:focus {
            background-color: #a5d3f3;
            /* Cor de fundo mais clara  ao focar com o mouse */
            color: #f7571d;
            /* Muda a cor do texto ao focar com o mouse */
        }
    </style>
</head>

<body>
    <nav>
        <a href="http://example1.com">Início</a>
        <a href="http://example2.com">Sobre</a>
        <a href="http://example3.com">Serviços</a>
        <a href="http://example4.com">Contato</a>
    </nav>
</body>

</html>

Transições e animações
Transições e animações podem elevar a interatividade de um site, melhorando a experiência do usuário ao tornar as mudanças visuais mais suaves e agradáveis.  

As transições permitem que você altere os valores das propriedades de forma gradual ao longo de um determinado período de tempo (MDN Web Docs, 2024; W3C Schools, 2024). Por exemplo, você pode suavizar a mudança de cor de um link quando o usuário passa o mouse sobre ele. A propriedade transition é usada para isso, especificando a propriedade CSS a ser alterada, a duração da transição e o tipo de temporização.

As animações, por outro lado, são mais complexas e permitem maior controle sobre a sequência de estilos que um elemento passa (MDN Web Docs, 2024; W3C Schools, 2024). Usando @keyframes, você define os estilos em diferentes pontos durante a animação. Você pode controlar a duração, o delay, o número de vezes que a animação se repete, entre outros parâmetros com a propriedade animation.

Vejamos no quadro abaixo um exemplo de como implementar transições e animações em links com CSS.
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transições e Animações em Links</title>
    <style>
        /* Estilo básico do link */
        a {
            display: inline-block;
            background-color: #0077cc;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.5s ease;
            /* Transição suave para a cor de fundo */
        }
        /* Efeito hover que desencadeia a transição */
        a:hover {
            background-color: #f03b35;
        }
        /* Animação que ocorre uma única vez ao passar o mouse */
        a:hover {
            animation: rotate-link 0.5s ease;
        }
        /* Definição da animação para girar o texto do link */
        @keyframes rotate-link {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <h1>Links com Transições e Animações CSS</h1>
    <a href="http://example1.com">Passe o mouse sobre mim!</a>    
</body>
</html>
