<!-- 
2.3 Fundos
A propriedade background é uma das mais poderosas ferramentas de estilização disponíveis para designers e desenvolvedores, permitindo uma ampla gama de efeitos visuais. É possível configurar cores, imagens, gradientes e repetições para criar layouts atrativos e dinâmicos. 

O CSS permite especificar vários aspectos do fundo de um elemento utilizando propriedades específicas:

background-color: Define a cor de fundo do elemento. Pode ser um nome de cor, valor hexadecimal, RGB, RGBA, HSL ou HSLA. Veja um exemplo no quadro abaixo:

background-color: #f8f8f8;

background-image: Especifica uma ou mais imagens para usar como fundo. As imagens são colocadas na ordem especificada, e a primeira imagem é colocada na frente. Veja um exemplo no quadro abaixo:

background-image: url('image.jpg');

background-repeat: Define como uma imagem de fundo deve ser repetida. Valores comuns incluem repeat, repeat-x, repeat-y, e no-repeat. Veja um exemplo no quadro abaixo:

background-repeat: repeat-x;  /* Repete horizontalmente */

background-position: Especifica a posição inicial da imagem de fundo. Pode ser definida em valores como top, bottom, left, right, centímetros, porcentagens, etc. Veja um exemplo no quadro abaixo:

background-position: top right;

background-size: Controla o tamanho da imagem de fundo; os valores podem ser cover (a imagem de fundo cobre completamente o conteúdo), contain (a imagem é redimensionada para caber), ou um valor específico (largura e altura). Veja um exemplo no quadro abaixo:

background-size: cover;

background-attachment: Determina se a imagem de fundo é fixa com relação à viewport ou se rola junto com o elemento contendo. Veja um exemplo no quadro abaixo:

background-attachment: fixed;

O CSS também suporta gradientes lineares e radiais como valores de background-image:

Gradiente Linear: A cor transita ao longo de uma linha entre dois ou mais pontos. Veja um exemplo no quadro abaixo:

background-image: linear-gradient(to right, red, orange, yellow);

Gradiente Radial: A cor transita radialmente de um ponto central. Veja um exemplo no quadro abaixo:

background-image: radial-gradient(circle, red, yellow, green);

Vejamos no quadro abaixo um exemplo mais completo:
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Fundos no CSS</title>
    <style>
        body {
            background-color: #fff;
            background-image: url('imagem.png'), linear-gradient(to right, rgba(255, 0, 0, 0), rgba(255, 0, 0, 0.5));
            background-repeat: no-repeat, repeat;
            background-position: center top, left top;
            background-size: contain, auto;
            background-attachment: fixed;
        }
    </style>
</head>

<body>
    <p>Veja como podemos combinar múltiplos fundos e efeitos!</p>
</body>

</html>
